# TLSNotary local stack for the browser app (client `/` TLSNotary page).
#
#   docker compose -f docker-compose.tlsn.yml up -d
#
# Starts:
#   • notary — ghcr.io/tlsnotary/tlsn/notary-server:v0.1.0-alpha.12 → http://127.0.0.1:7047
#   • wstcp  — WebSocket proxy → example.com:443 on ws://127.0.0.1:55688
#
# The Vite app defaults to that notary URL + WS proxy + https://example.com/ so you can
# click “Run TLSNotary prove” with zero .env. For another HTTPS host, run a second wstcp
# (or change the wstcp service command) and point “WebSocket proxy” at it.
#
# Server-only (Node) hook, optional:
#   TLSN_PROVER_URL=…  — separate HTTP POST /prove service, not used by the browser UI.

services:
  notary:
    image: ghcr.io/tlsnotary/tlsn/notary-server:v0.1.0-alpha.12
    platform: linux/amd64
    container_name: dct-notary
    ports:
      - "7047:7047"
    environment:
      - RUST_LOG=info
    volumes:
      - ./docker/tlsn/notary-config.yaml:/app/config/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7047/info"]
      interval: 10s
      timeout: 5s
      retries: 5

  wstcp:
    build:
      context: ./docker/tlsn/wstcp
    container_name: dct-wstcp
    ports:
      - "55688:55688"
    # Matches default attest URL https://example.com/ — tlsn-js appends ?token=<hostname>
    command: ["--bind-addr", "0.0.0.0:55688", "example.com:443"]
    restart: unless-stopped
